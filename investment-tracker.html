<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Tracker</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #ccc9be;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #9e9b91;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --amber-border: #fde68a;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fecaca;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  
  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .nav { flex: 1; padding: 8px; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; transition: all .12s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
  .nav-item svg { flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; background: var(--bg); }
  .page { display: none; padding: 28px 32px; max-width: 900px; }
  .page.active { display: block; }
  
  /* Page header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 20px; font-weight: 600; }
  .page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: background .1s; }
  .card-header:hover { background: var(--surface2); }
  .card-body { border-top: 1px solid var(--border); padding: 16px; }
  .card-footer { border-top: 1px solid var(--border); padding: 10px 16px; background: var(--surface2); display: flex; align-items: center; justify-content: space-between; }

  /* Stat cards */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Badges */
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; letter-spacing: .03em; }
  .badge-blue { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-gray { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .badge-sold { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; white-space: nowrap; }
  .btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
  .btn-danger { color: var(--red); border-color: var(--red-border); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
  .btn-green:hover { background: #dcfce7; }
  .btn-sm { padding: 4px 9px; font-size: 11px; }
  .btn-icon { padding: 5px 7px; color: var(--text3); border-color: transparent; background: transparent; }
  .btn-icon:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }

  /* Inputs */
  input[type=text], input[type=number], input[type=date], select, textarea {
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px;
    font-size: 13px; color: var(--text); background: var(--surface); outline: none;
    transition: border-color .12s; font-family: inherit; width: 100%; line-height: 1.5;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.08); }
  input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
  .field { display: flex; flex-direction: column; gap: 4px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 600; color: var(--text3); padding: 8px 12px; text-align: left; background: var(--surface2); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* Progress */
  .progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; width: 80px; display: inline-block; vertical-align: middle; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }

  /* Section label */
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 20px 0 8px; }
  
  /* Inline form row */
  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .form-row .field { flex: 1; min-width: 100px; }
  
  /* Add row */
  .add-row { background: var(--surface2); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  
  /* Year pills for insurance */
  .year-pills { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
  .year-pill { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); transition: all .12s; }
  .year-pill.paid { background: var(--green-bg); border-color: var(--green-border); }
  .year-pill-year { font-size: 12px; font-weight: 500; min-width: 50px; }
  .year-pill input[type=number] { width: 85px; font-size: 12px; padding: 3px 7px; }
  .year-pill-status { font-size: 11px; color: var(--text3); }
  .year-pill.paid .year-pill-status { color: var(--green); font-weight: 500; }

  /* Sold overlay */
  .lot-sold { opacity: .5; }
  .sold-badge { font-size: 10px; background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); padding: 1px 6px; border-radius: 10px; }

  /* Summary table year selector */
  .year-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
  .year-tab { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: var(--surface); color: var(--text2); font-weight: 500; transition: all .12s; }
  .year-tab:hover { border-color: var(--border2); color: var(--text); }
  .year-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Chevron */
  .chev { font-size: 10px; color: var(--text3); transition: transform .15s; margin-left: auto; }
  .chev.open { transform: rotate(180deg); }

  /* Empty state */
  .empty { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }
  .empty svg { opacity: .3; margin-bottom: 8px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  /* DCA log */
  .log-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .log-item:last-child { border-bottom: none; }
  .log-date { color: var(--text2); min-width: 100px; }
  .log-amt { font-weight: 500; margin-left: auto; }
  .log-note { color: var(--text3); font-size: 11px; }

  @media (max-width: 600px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .nav { display: flex; padding: 6px; overflow-x: auto; }
    .nav-item { white-space: nowrap; }
    .page { padding: 16px; }
  }
</style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

        </div>

      <div id="summary-content"></div>

</div>

<script>
// ─── STATE ─────────────────────────────────────────────────
let state = {
  taxCategories: [],   // [{id, name, type, holdYears, noExpiry, funds:[{id,name,lots:[{id,year,amt,sold,soldDate}]}]}]
  insurances: [],      // [{id,name,holdYears,payYears,startYear,annualPremium,years:[{year,paid,amt}]}]
  mfGroups: [],        // [{id,name,funds:[{id,name,currentAmt,dca:{enabled,dayOfMonth,amount},logs:[{id,date,amt,note}]}]}]
};

let openCards = {};
const CY = new Date().getFullYear();

function save(){ try{localStorage.setItem('inv_tracker', JSON.stringify(state));}catch(e){} }
function load(){
  try{
    const d = localStorage.getItem('inv_tracker');
    if(d) state = JSON.parse(d);
  }catch(e){}
}

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmt(n){ return Number(n||0).toLocaleString('th-TH'); }
function parseYear(v){ return parseInt(v)||0; }

// ─── PAGE NAV ──────────────────────────────────────────────
function showPage(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='summary') renderSummary();
  if(id==='overview') renderOverview();
}

// ─── MODAL HELPER ──────────────────────────────────────────
function prompt2(title, fields, onOk){
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:999';
  const box = document.createElement('div');
  box.style.cssText='background:#fff;border-radius:12px;padding:24px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)';
  let html = `<div style="font-size:15px;font-weight:600;margin-bottom:16px">${title}</div>`;
  fields.forEach(f=>{
    if(f.type==='select'){
      html+=`<div class="field" style="margin-bottom:12px"><label>${f.label}</label><select id="mf-${f.key}">${f.options.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}</select></div>`;
    } else {
      html+=`<div class="field" style="margin-bottom:12px"><label>${f.label}</label><input type="${f.type||'text'}" id="mf-${f.key}" placeholder="${f.placeholder||''}" value="${f.default||''}"></div>`;
    }
  });
  html+=`<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
    <button class="btn" onclick="this.closest('[data-overlay]').remove()">ยกเลิก</button>
    <button class="btn btn-primary" id="mf-ok-btn">ตกลง</button>
  </div>`;
  box.innerHTML=html;
  overlay.setAttribute('data-overlay','1');
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  box.querySelector('#mf-ok-btn').onclick=()=>{
    const vals={};
    fields.forEach(f=>{ vals[f.key]=box.querySelector('#mf-'+f.key).value; });
    overlay.remove();
    onOk(vals);
  };
  setTimeout(()=>{ const first=box.querySelector('input,select'); if(first)first.focus(); },50);
}

// ═══════════════════════════════════════════════════════════
// TAX FUNDS
// ═══════════════════════════════════════════════════════════
function addTaxCategory(){
  prompt2('เพิ่มประเภทกองทุนลดหย่อนภาษี',[
    {key:'name', label:'ชื่อประเภท (เช่น SSF, ThaiESG, RMF)', placeholder:'SSF'},
    {key:'holdYears', label:'ถือขั้นต่ำกี่ปี (ใส่ 0 = ไม่มีกำหนด)', type:'number', placeholder:'10', default:'10'},
  ], v=>{
    const hold = parseInt(v.holdYears)||0;
    state.taxCategories.push({
      id: uid(), name: v.name.trim()||'กองทุนใหม่',
      holdYears: hold, noExpiry: hold===0, funds:[]
    });
    save(); renderTax();
  });
}

function addTaxFund(catId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  if(!cat) return;
  prompt2(`เพิ่มกองทุนใน ${cat.name}`,[
    {key:'name', label:'ชื่อกองทุน', placeholder:'เช่น K-FIXEDPLUS-SSF'},
  ], v=>{
    cat.funds.push({ id:uid(), name:v.name.trim()||'กองทุน', lots:[], dca:{enabled:false,dayOfMonth:1,amount:0}, logs:[] });
    save(); renderTax();
  });
}

function addLot(catId, fundId){
  prompt2('เพิ่ม lot การซื้อ',[
    {key:'year', label:'ปีที่ซื้อ', type:'number', placeholder:'', default:CY},
    {key:'amt', label:'จำนวนเงิน (บาท)', type:'number', placeholder:''},
  ], v=>{
    const cat = state.taxCategories.find(c=>c.id===catId);
    const fund = cat&&cat.funds.find(f=>f.id===fundId);
    if(!fund) return;
    const y = parseYear(v.year);
    const existing = fund.lots.find(l=>l.year===y);
    if(existing){ existing.amt+=parseFloat(v.amt)||0; }
    else { fund.lots.push({id:uid(), year:y, amt:parseFloat(v.amt)||0, sold:false, soldDate:''}); }
    fund.lots.sort((a,b)=>a.year-b.year);
    save(); renderTax();
  });
}

function sellLot(catId, fundId, lotId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  const lot = fund&&fund.lots.find(l=>l.id===lotId);
  if(!lot) return;
  if(lot.sold){ lot.sold=false; lot.soldDate=''; save(); renderTax(); return; }
  prompt2('บันทึกการขาย',[
    {key:'date', label:'วันที่ขาย', type:'date', default: new Date().toISOString().slice(0,10)},
  ], v=>{
    lot.sold=true; lot.soldDate=v.date;
    save(); renderTax();
  });
}

function deleteTaxCat(catId){
  if(!confirm('ลบประเภทกองทุนนี้?')) return;
  state.taxCategories = state.taxCategories.filter(c=>c.id!==catId);
  save(); renderTax();
}

function deleteTaxFund(catId, fundId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  if(!cat) return;
  if(!confirm('ลบกองทุนนี้?')) return;
  cat.funds = cat.funds.filter(f=>f.id!==fundId);
  save(); renderTax();
}

function deleteLot(catId, fundId, lotId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  if(!fund) return;
  fund.lots = fund.lots.filter(l=>l.id!==lotId);
  save(); renderTax();
}


function toggleTaxDCA(catId, fundId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  if(!fund) return;
  if(!fund.dca) fund.dca={enabled:false,dayOfMonth:1,amount:0};
  if(!fund.dca.enabled){
    prompt2('ตั้ง DCA — '+fund.name,[
      {key:'day', label:'วันที่ DCA ต่อเดือน (1-28)', type:'number', placeholder:'1', default:'1'},
      {key:'amount', label:'จำนวนเงิน/เดือน (บาท)', type:'number', placeholder:''},
    ], v=>{
      fund.dca.enabled=true;
      fund.dca.dayOfMonth=parseInt(v.day)||1;
      fund.dca.amount=parseFloat(v.amount)||0;
      save(); renderTax();
    });
  } else {
    fund.dca.enabled=false; save(); renderTax();
  }
}

function editTaxDCA(catId, fundId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  if(!fund||!fund.dca) return;
  prompt2('แก้ไข DCA — '+fund.name,[
    {key:'day', label:'วันที่ DCA ต่อเดือน', type:'number', default:fund.dca.dayOfMonth},
    {key:'amount', label:'จำนวนเงิน/เดือน (บาท)', type:'number', default:fund.dca.amount},
  ], v=>{
    fund.dca.dayOfMonth=parseInt(v.day)||1;
    fund.dca.amount=parseFloat(v.amount)||0;
    save(); renderTax();
  });
}

function addTaxLog(catId, fundId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  if(!fund) return;
  prompt2('บันทึกการซื้อ — '+fund.name,[
    {key:'date', label:'วันที่', type:'date', default:new Date().toISOString().slice(0,10)},
    {key:'amt', label:'จำนวนเงิน (บาท)', type:'number', placeholder:''},
    {key:'note', label:'หมายเหตุ (ไม่บังคับ)', placeholder:''},
  ], v=>{
    if(!fund.logs) fund.logs=[];
    const d = new Date(v.date);
    const yr = d.getFullYear();
    fund.logs.push({id:uid(), date:v.date, amt:parseFloat(v.amt)||0, note:v.note.trim()});
    fund.logs.sort((a,b)=>b.date.localeCompare(a.date));
    // Auto-add or update lot for that year
    const ex = fund.lots.find(l=>l.year===yr);
    if(ex){ ex.amt+=(parseFloat(v.amt)||0); }
    else { fund.lots.push({id:uid(), year:yr, amt:parseFloat(v.amt)||0, sold:false, soldDate:''}); fund.lots.sort((a,b)=>a.year-b.year); }
    save(); renderTax();
  });
}

function deleteTaxLog(catId, fundId, logId){
  const cat = state.taxCategories.find(c=>c.id===catId);
  const fund = cat&&cat.funds.find(f=>f.id===fundId);
  if(!fund) return;
  const log = fund.logs.find(l=>l.id===logId);
  if(!log) return;
  // Subtract from lot
  const yr = new Date(log.date).getFullYear();
  const lot = fund.lots.find(l=>l.year===yr);
  if(lot){ lot.amt=Math.max(0,lot.amt-log.amt); }
  fund.logs=fund.logs.filter(l=>l.id!==logId);
  save(); renderTax();
}

function renderTax(){
  const cats = state.taxCategories;
  // summary
  const totalAll = cats.reduce((s,c)=>s+c.funds.reduce((s2,f)=>s2+f.lots.reduce((s3,l)=>s3+l.amt,0),0),0);
  const totalCats = cats.length;
  const totalFunds = cats.reduce((s,c)=>s+c.funds.length,0);
  document.getElementById('tax-summary').innerHTML=`
    <div class="stat-card"><div class="stat-label">ลงทุนรวม</div><div class="stat-value">${fmt(totalAll)}</div><div class="stat-sub">บาท</div></div>
    <div class="stat-card"><div class="stat-label">ประเภทกองทุน</div><div class="stat-value">${totalCats}</div><div class="stat-sub">ประเภท</div></div>
    <div class="stat-card"><div class="stat-label">กองทุนทั้งหมด</div><div class="stat-value">${totalFunds}</div><div class="stat-sub">กองทุน</div></div>
  `;

  if(!cats.length){
    document.getElementById('tax-categories').innerHTML=`<div class="empty"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg><br>กดปุ่ม "+ เพิ่มประเภทกองทุน" เพื่อเริ่มต้น</div>`;
    return;
  }

  let html = '';
  cats.forEach(cat=>{
    const catTotal = cat.funds.reduce((s,f)=>s+f.lots.reduce((s2,l)=>s2+l.amt,0),0);
    const isOpen = openCards['cat-'+cat.id];
    const holdLabel = cat.noExpiry ? 'ไม่มีกำหนด' : `${cat.holdYears} ปี`;
    html+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input style="font-size:15px;font-weight:600;border:none;background:transparent;color:var(--text);padding:2px 0;line-height:1.5;min-width:80px;width:auto;overflow:visible;height:auto" value="${cat.name}" onchange="renameTaxCat('${cat.id}',this.value)" onclick="event.stopPropagation()">
        <span class="badge badge-gray">ถือ ${holdLabel}</span>
        <span style="color:var(--text3);font-size:13px;margin-left:auto">${fmt(catTotal)} บาท</span>
        <button class="btn btn-sm" onclick="addTaxFund('${cat.id}')">+ เพิ่มกองทุน</button>
        <button class="btn btn-sm btn-danger" onclick="deleteTaxCat('${cat.id}')">ลบประเภท</button>
      </div>`;

    if(!cat.funds.length){
      html+=`<div class="card"><div class="empty" style="padding:20px">ยังไม่มีกองทุน กดปุ่ม "+ เพิ่มกองทุน" ด้านบน</div></div>`;
    }

    cat.funds.forEach(fund=>{
      const fundTotal = fund.lots.reduce((s,l)=>s+l.amt,0);
      const fundKey = 'fund-'+fund.id;
      const fOpen = openCards[fundKey];
      const activeLots = fund.lots.filter(l=>!l.sold);
      html+=`<div class="card">
        <div class="card-header" onclick="openCards['${fundKey}']=!openCards['${fundKey}'];renderTax()">
          <span style="font-size:14px;font-weight:500;flex:1">${fund.name}</span>
          <span style="font-size:12px;color:var(--text3)">${activeLots.length} lot · ${fmt(fundTotal)} บาท</span>
          <button class="btn btn-sm btn-danger" style="margin-left:8px" onclick="event.stopPropagation();deleteTaxFund('${cat.id}','${fund.id}')">ลบ</button>
          <span class="chev ${fOpen?'open':''}">▼</span>
        </div>`;
      if(fOpen){
        const dca = fund.dca||{enabled:false,dayOfMonth:1,amount:0};
        const logs = fund.logs||[];
        html+=`<div class="card-body" style="padding:0">`;
        // DCA + buy button row
        html+=`<div class="add-row" style="border-top:none;border-bottom:1px solid var(--border)">
          ${dca.enabled
            ?`<span class="badge badge-blue">DCA ${fmt(dca.amount)}/เดือน วันที่ ${dca.dayOfMonth}</span>
              <button class="btn btn-sm" onclick="editTaxDCA('${cat.id}','${fund.id}')">✏️ แก้ไข DCA</button>
              <button class="btn btn-sm btn-danger" onclick="toggleTaxDCA('${cat.id}','${fund.id}')">ปิด DCA</button>`
            :`<button class="btn btn-sm btn-primary" onclick="toggleTaxDCA('${cat.id}','${fund.id}')">+ ตั้ง DCA</button>`
          }
          <button class="btn btn-sm btn-green" onclick="addTaxLog('${cat.id}','${fund.id}')">+ บันทึกการซื้อ</button>
          <button class="btn btn-primary btn-sm" onclick="addLot('${cat.id}','${fund.id}')" style="margin-left:auto">+ เพิ่ม lot (manual)</button>
        </div>`;
        // Logs
        if(logs.length){
          html+=`<div style="padding:8px 16px;border-bottom:1px solid var(--border)">
            <div style="font-size:11px;color:var(--text3);margin-bottom:4px">ประวัติการซื้อ</div>`;
          logs.slice(0,6).forEach(l=>{
            const dd=l.date?new Date(l.date).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}):'';
            html+=`<div class="log-item">
              <span class="log-date">${dd}</span>
              <span class="log-note">${l.note||''}</span>
              <span class="log-amt">+${fmt(l.amt)} บาท</span>
              <button class="btn btn-icon btn-sm" onclick="deleteTaxLog('${cat.id}','${fund.id}','${l.id}')">✕</button>
            </div>`;
          });
          html+=`</div>`;
        }
        if(!fund.lots.length){
          html+=`<div class="empty" style="padding:16px">ยังไม่มี lot</div>`;
        } else {
          html+=`<table><tr><th>ปีที่ซื้อ</th><th>จำนวนเงิน</th><th>ความคืบหน้า</th><th>ขายได้ปี</th><th>สถานะ</th><th></th></tr>`;
          fund.lots.forEach(lot=>{
            const held = CY - lot.year;
            const pct = cat.noExpiry ? 100 : Math.min(100, held/cat.holdYears*100);
            const sellY = lot.year + cat.holdYears;
            const canSell = cat.noExpiry || CY >= sellY;
            const rowClass = lot.sold ? 'lot-sold' : '';
            html+=`<tr class="${rowClass}">
              <td>${lot.year}</td>
              <td style="font-weight:500">${fmt(lot.amt)} บาท</td>
              <td>${cat.noExpiry?`<span style="font-size:11px;color:var(--text3)">ถือตลอด</span>`:`
                <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
                <span style="font-size:11px;color:var(--text3);margin-left:6px">${held}/${cat.holdYears} ปี</span>
              `}</td>
              <td style="font-size:12px;color:${canSell&&!lot.sold?'var(--green)':'var(--text3)'}">${cat.noExpiry?'—':canSell?`<span style="color:var(--green);font-weight:500">✓ ขายได้</span>`:`${sellY}`}</td>
              <td>${lot.sold?`<span class="sold-badge">ขายแล้ว ${lot.soldDate?new Date(lot.soldDate).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}):''}</span>`:`<span style="font-size:11px;color:var(--text3)">ถือครอง</span>`}</td>
              <td><div style="display:flex;gap:4px">
                ${!lot.sold?`<button class="btn btn-sm btn-green" onclick="sellLot('${cat.id}','${fund.id}','${lot.id}')">ขาย</button>`:`<button class="btn btn-sm" onclick="sellLot('${cat.id}','${fund.id}','${lot.id}')">ยกเลิก</button>`}
                <button class="btn btn-sm btn-danger" onclick="deleteLot('${cat.id}','${fund.id}','${lot.id}')">ลบ</button>
              </div></td>
            </tr>`;
          });
          html+=`</table>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('tax-categories').innerHTML=html;
}

function addInsurance(){
  prompt2('เพิ่มกรมธรรม์ประกัน',[
    {key:'name', label:'ชื่อกรมธรรม์', placeholder:'ประกันชีวิต A'},
    {key:'startYear', label:'ปีเริ่มต้น', type:'number', placeholder:'', default:CY},
    {key:'holdYears', label:'ต้องถือกี่ปี', type:'number', placeholder:'10', default:'10'},
    {key:'payYears', label:'ต้องจ่ายกี่ปี', type:'number', placeholder:'5', default:'5'},
    {key:'annualPremium', label:'เบี้ยต่อปี (บาท)', type:'number', placeholder:''},
  ], v=>{
    const ins = {
      id:uid(), name:v.name.trim()||'ประกันใหม่',
      startYear: parseYear(v.startYear)||CY,
      holdYears: parseInt(v.holdYears)||10,
      payYears: parseInt(v.payYears)||5,
      annualPremium: parseFloat(v.annualPremium)||0,
      years:[]
    };
    initInsYears(ins);
    state.insurances.push(ins);
    save(); renderIns();
  });
}

function initInsYears(ins){
  const existing = ins.years||[];
  ins.years=[];
  for(let i=0;i<ins.payYears;i++){
    const y = ins.startYear+i;
    const ex = existing.find(e=>e.year===y);
    ins.years.push(ex||{year:y, paid:false, amt:ins.annualPremium});
  }
}

function updateInsCfg(id, key, val){
  const ins = state.insurances.find(i=>i.id===id);
  if(!ins) return;
  if(key==='name'){ins.name=val;save();return;}
  ins[key] = key.includes('Premium')?parseFloat(val)||0:parseInt(val)||0;
  if(['holdYears','payYears','startYear','annualPremium'].includes(key)) initInsYears(ins);
  save(); renderIns();
}

function toggleYrPaid(insId, yi, checked){
  const ins = state.insurances.find(i=>i.id===insId);
  if(ins) ins.years[yi].paid=checked;
  save(); renderIns();
}

function updateYrAmt(insId, yi, val){
  const ins = state.insurances.find(i=>i.id===insId);
  if(ins) ins.years[yi].amt=parseFloat(val)||0;
  save();
}

function deleteIns(id){
  if(!confirm('ลบกรมธรรม์นี้?')) return;
  state.insurances=state.insurances.filter(i=>i.id!==id);
  save(); renderIns();
}

function renderIns(){
  const ins = state.insurances;
  const totalPaid = ins.reduce((s,i)=>s+i.years.filter(y=>y.paid).reduce((s2,y)=>s2+y.amt,0),0);
  const totalPolicies = ins.length;
  document.getElementById('ins-summary').innerHTML=`
    <div class="stat-card"><div class="stat-label">จ่ายไปแล้วรวม</div><div class="stat-value">${fmt(totalPaid)}</div><div class="stat-sub">บาท</div></div>
    <div class="stat-card"><div class="stat-label">จำนวนกรมธรรม์</div><div class="stat-value">${totalPolicies}</div><div class="stat-sub">กรมธรรม์</div></div>
  `;
  if(!ins.length){
    document.getElementById('ins-list').innerHTML=`<div class="empty"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><br>กดปุ่ม "+ เพิ่มกรมธรรม์" เพื่อเริ่มต้น</div>`;
    return;
  }
  let html='';
  ins.forEach((p,pi)=>{
    const paidAmt = p.years.filter(y=>y.paid).reduce((s,y)=>s+y.amt,0);
    const paidCount = p.years.filter(y=>y.paid).length;
    const endY = p.startYear+p.holdYears;
    html+=`<div class="card" style="margin-bottom:12px">
      <div class="card-header" style="cursor:default">
        <div style="flex:1">
          <input style="font-size:14px;font-weight:600;border:none;background:transparent;color:var(--text);padding:0;width:auto;min-width:150px" value="${p.name}" onchange="updateInsCfg('${p.id}','name',this.value)" onclick="event.stopPropagation()">
        </div>
        <span style="font-size:12px;color:var(--text3)">จ่าย ${paidCount}/${p.payYears} ปี · รวม ${fmt(paidAmt)} บาท</span>
        <button class="btn btn-sm btn-danger" onclick="deleteIns('${p.id}')">ลบ</button>
      </div>
      <div class="card-body">
        <div class="form-row" style="margin-bottom:14px">
          <div class="field"><label>ถือกี่ปี</label><input type="number" value="${p.holdYears}" style="max-width:90px" onchange="updateInsCfg('${p.id}','holdYears',this.value)"></div>
          <div class="field"><label>จ่ายกี่ปี</label><input type="number" value="${p.payYears}" style="max-width:90px" onchange="updateInsCfg('${p.id}','payYears',this.value)"></div>
          <div class="field"><label>ปีเริ่มต้น</label><input type="number" value="${p.startYear}" style="max-width:100px" onchange="updateInsCfg('${p.id}','startYear',this.value)"></div>
          <div class="field"><label>เบี้ย/ปี (บาท)</label><input type="number" value="${p.annualPremium}" style="max-width:110px" onchange="updateInsCfg('${p.id}','annualPremium',this.value)"></div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">ปีที่ต้องจ่ายเบี้ย — ติ๊กถูก = จ่ายแล้ว · แก้ไขยอดเงินได้</div>
        <div class="year-pills">`;
    p.years.forEach((yr,yi)=>{
      html+=`<div class="year-pill ${yr.paid?'paid':''}">
        <input type="checkbox" ${yr.paid?'checked':''} onchange="toggleYrPaid('${p.id}',${yi},this.checked)">
        <span class="year-pill-year">${yr.year}</span>
        <input type="number" class="year-pill" style="width:85px;font-size:12px;padding:3px 7px;border:1px solid var(--border);border-radius:4px" value="${yr.amt}" onchange="updateYrAmt('${p.id}',${yi},this.value)">
        <span class="year-pill-status">${yr.paid?'✓ จ่าย':'รอ'}</span>
      </div>`;
    });
    html+=`</div>
      </div>
      <div class="card-footer">
        <span style="font-size:12px;color:var(--text3)">ครบสัญญาปี ${endY}</span>
        <span style="font-size:12px;font-weight:500">รวมจ่าย ${fmt(paidAmt)} บาท</span>
      </div>
    </div>`;
  });
  document.getElementById('ins-list').innerHTML=html;
}

function addMFGroup(){
  prompt2('เพิ่มกลุ่มกองทุน',[
    {key:'name', label:'ชื่อกลุ่ม (เช่น Core, Satellite, ตราสารหนี้)', placeholder:'Core'},
  ], v=>{
    state.mfGroups.push({id:uid(), name:v.name.trim()||'กลุ่มใหม่', funds:[]});
    save(); renderMF();
  });
}

function addMFFund(groupId){
  prompt2('เพิ่มกองทุน',[
    {key:'name', label:'ชื่อกองทุน', placeholder:'เช่น SCBS&P500'},
    {key:'amt', label:'ยอดเงินปัจจุบัน (บาท)', type:'number', placeholder:'0'},
  ], v=>{
    const g = state.mfGroups.find(g=>g.id===groupId);
    if(!g) return;
    g.funds.push({
      id:uid(), name:v.name.trim()||'กองทุน',

    });

function editMFFundName(groupId, fundId, val){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(f){ f.name=val; save(); }
}

function editMFFundAmt(groupId, fundId, val){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(f){ f.currentAmt=parseFloat(val)||0; save(); renderMF(); }
}

function toggleDCA(groupId, fundId){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(!f) return;
  if(!f.dca.enabled){
    prompt2(`ตั้ง DCA — ${f.name}`,[
      {key:'day', label:'วันที่ DCA ต่อเดือน (1-28)', type:'number', placeholder:'1', default:'1'},
      {key:'amount', label:'จำนวนเงิน/เดือน (บาท)', type:'number', placeholder:'2000'},
    ], v=>{
      f.dca.enabled=true;
      f.dca.dayOfMonth=parseInt(v.day)||1;
      f.dca.amount=parseFloat(v.amount)||0;
      save(); renderMF();
    });
  } else {
    f.dca.enabled=false; save(); renderMF();
  }
}

function editDCA(groupId, fundId){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(!f) return;
  prompt2(`แก้ไข DCA — ${f.name}`,[
    {key:'day', label:'วันที่ DCA ต่อเดือน', type:'number', default:f.dca.dayOfMonth},
    {key:'amount', label:'จำนวนเงิน/เดือน (บาท)', type:'number', default:f.dca.amount},
  ], v=>{
    f.dca.dayOfMonth=parseInt(v.day)||1;
    f.dca.amount=parseFloat(v.amount)||0;
    save(); renderMF();
  });
}

function addMFLog(groupId, fundId){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(!f) return;
  prompt2(`บันทึกการซื้อ — ${f.name}`,[
    {key:'date', label:'วันที่', type:'date', default:new Date().toISOString().slice(0,10)},
    {key:'amt', label:'จำนวนเงิน (บาท)', type:'number', placeholder:'5000'},
    {key:'note', label:'หมายเหตุ (ไม่บังคับ)', placeholder:'DCA รอบมิถุนายน'},
  ], v=>{
    f.logs.push({id:uid(), date:v.date, amt:parseFloat(v.amt)||0, note:v.note.trim()});
    f.logs.sort((a,b)=>b.date.localeCompare(a.date));
    save(); renderMF();
  });
}

function deleteMFLog(groupId, fundId, logId){
  const g = state.mfGroups.find(g=>g.id===groupId);
  const f = g&&g.funds.find(f=>f.id===fundId);
  if(!f) return;
  f.logs=f.logs.filter(l=>l.id!==logId);
  save(); renderMF();
}

function deleteMFFund(groupId, fundId){
  if(!confirm('ลบกองทุนนี้?')) return;
  const g = state.mfGroups.find(g=>g.id===groupId);
  if(!g) return;
  g.funds=g.funds.filter(f=>f.id!==fundId);
  save(); renderMF();
}

function deleteMFGroup(groupId){
  if(!confirm('ลบกลุ่มนี้?')) return;
  state.mfGroups=state.mfGroups.filter(g=>g.id!==groupId);
  save(); renderMF();
}

  }
  let html='';
  groups.forEach(g=>{

    const isOpen = openCards[gKey];
    html+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input style="font-size:15px;font-weight:600;border:none;background:transparent;color:var(--text);padding:2px 0;line-height:1.5;flex:1;min-width:0;overflow:visible;height:auto" value="${g.name}" onchange="renameMFGroup('${g.id}',this.value)">
        <span style="color:var(--text3);font-size:13px;margin-left:auto">${fmt(gTotal)} บาท</span>
        <button class="btn btn-sm" onclick="addMFFund('${g.id}')">+ เพิ่มกองทุน</button>
        <button class="btn btn-sm btn-danger" onclick="deleteMFGroup('${g.id}')">ลบกลุ่ม</button>
      </div>`;
    if(!g.funds.length){
      html+=`<div class="card"><div class="empty" style="padding:16px">ยังไม่มีกองทุนในกลุ่มนี้</div></div>`;

    g.funds.forEach(f=>{

function getAllYears(){
  const ys = new Set();
  state.taxCategories.forEach(c=>c.funds.forEach(f=>f.lots.forEach(l=>ys.add(l.year))));
  state.insurances.forEach(p=>p.years.forEach(y=>ys.add(y.year)));
  state.mfGroups.forEach(g=>g.funds.forEach(f=>f.logs.forEach(l=>{ if(l.date) ys.add(new Date(l.date).getFullYear()); })));
  if(!ys.size) ys.add(CY);
  return [...ys].sort((a,b)=>a-b);
}

let summaryYear = null;
function renderSummary(){
  const years = getAllYears();
  if(!summaryYear || !years.includes(summaryYear)) summaryYear = years[years.length-1]||CY;
  const y = summaryYear;

  const taxRows = [];
  state.taxCategories.forEach(cat=>{
    cat.funds.forEach(fund=>{
      fund.lots.forEach(lot=>{
        if(lot.year===y) taxRows.push({cat:cat.name, fund:fund.name, amt:lot.amt});
      });
    });
  });
  const taxTotal = taxRows.reduce((s,r)=>s+r.amt,0);

  const insRows = [];
  state.insurances.forEach(p=>{
    p.years.forEach(yr=>{
      if(yr.year===y) insRows.push({name:p.name, amt:yr.amt, paid:yr.paid});
    });
  });
  const insTotal = insRows.reduce((s,r)=>s+r.amt,0);
  const insPaid = insRows.filter(r=>r.paid).reduce((s,r)=>s+r.amt,0);

  const grandTotal = taxTotal + insPaid;

  let html=`<div class="year-tabs">${years.map(yr=>`<button class="year-tab ${yr===y?'active':''}" onclick="summaryYear=${yr};renderSummary()">${yr}</button>`).join('')}</div>`;
  html+=`<div class="stats-row">
    <div class="stat-card"><div class="stat-label">รวมลดหย่อน + ประกัน</div><div class="stat-value">${fmt(grandTotal)}</div><div class="stat-sub">บาท</div></div>
    <div class="stat-card"><div class="stat-label">กองทุนลดหย่อนฯ</div><div class="stat-value">${fmt(taxTotal)}</div><div class="stat-sub">บาท</div></div>
    <div class="stat-card"><div class="stat-label">ประกัน (จ่ายแล้ว)</div><div class="stat-value">${fmt(insPaid)}</div><div class="stat-sub">จากทั้งหมด ${fmt(insTotal)}</div></div>
  </div>`;

  if(taxRows.length){
    html+=`<div class="section-label">กองทุนลดหย่อนภาษี</div><div class="card"><table>
      <tr><th>ประเภท</th><th>กองทุน</th><th style="text-align:right">จำนวนเงิน</th></tr>
      ${taxRows.map(r=>`<tr><td><span class="badge badge-blue">${r.cat}</span></td><td>${r.fund}</td><td style="text-align:right;font-weight:500">${fmt(r.amt)} บาท</td></tr>`).join('')}
      <tr style="background:var(--surface2)"><td colspan="2" style="font-weight:600">รวม</td><td style="text-align:right;font-weight:600">${fmt(taxTotal)} บาท</td></tr>
    </table></div>`;
  }
  if(insRows.length){
    html+=`<div class="section-label">ประกัน</div><div class="card"><table>
      <tr><th>กรมธรรม์</th><th>สถานะ</th><th style="text-align:right">เบี้ย</th></tr>
      ${insRows.map(r=>`<tr><td>${r.name}</td><td>${r.paid?`<span class="badge badge-green">จ่ายแล้ว</span>`:`<span class="badge badge-gray">รอจ่าย</span>`}</td><td style="text-align:right;font-weight:500">${fmt(r.amt)} บาท</td></tr>`).join('')}
      <tr style="background:var(--surface2)"><td colspan="2" style="font-weight:600">รวม</td><td style="text-align:right;font-weight:600">${fmt(insTotal)} บาท</td></tr>
    </table></div>`;
  }
  if(!taxRows.length&&!insRows.length){
    html+=`<div class="empty" style="margin-top:40px"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><br>ยังไม่มีข้อมูลในปี ${y}</div>`;
  }
  document.getElementById('summary-content').innerHTML=html;
}

// OVERVIEW + EXPORT EXCEL

function getPortfolioData(){
  const sections = [];
  // Tax funds
  state.taxCategories.forEach(cat=>{
    cat.funds.forEach(fund=>{
      const total = fund.lots.filter(l=>!l.sold).reduce((s,l)=>s+l.amt,0);
      if(total>0) sections.push({group:'ลดหย่อนภาษี', label:`[${cat.name}] ${fund.name}`, amt:total});
    });
  });
  // MF
  state.mfGroups.forEach(g=>{
    g.funds.forEach(f=>{
      if(f.currentAmt>0) sections.push({group:'กองทุนรวม', label:`[${g.name}] ${f.name}`, amt:f.currentAmt});
    });
  });
  // Insurance (ยอดจ่ายสะสม)
  state.insurances.forEach(p=>{
    const paid = p.years.filter(y=>y.paid).reduce((s,y)=>s+y.amt,0);
    if(paid>0) sections.push({group:'ประกัน', label:p.name, amt:paid});
  });
  // Stocks
  (state.stockGroups||[]).forEach(g=>{
    g.stocks.forEach(st=>{
      const val=Math.round(st.shares*st.price);
      if(val>0) sections.push({group:'หุ้น', label:`[${g.name}] ${st.ticker}`, amt:val});
    });
  });
  return sections;
}

const GROUP_BASE = {'ลดหย่อนภาษี':'#2563eb','กองทุนรวม':'#16a34a','ประกัน':'#9333ea','หุ้น':'#d97706'};

function renderOverview(){
  const data = getPortfolioData();
  const grandTotal = data.reduce((s,d)=>s+d.amt,0);
  const groups = {};
  data.forEach(d=>{ groups[d.group]=(groups[d.group]||0)+d.amt; });
  const groupKeys = Object.keys(groups);

  // Stat cards
  document.getElementById('overview-summary').innerHTML=`
    <div class="stat-card"><div class="stat-label">ทรัพย์สินรวม</div><div class="stat-value">${fmt(Math.round(grandTotal))}</div><div class="stat-sub">บาท</div></div>
    ${groupKeys.map(k=>`<div class="stat-card"><div class="stat-label">${k}</div><div class="stat-value" style="color:${GROUP_BASE[k]||'#6b7280'}">${fmt(Math.round(groups[k]))}</div><div class="stat-sub">${grandTotal?Math.round(groups[k]/grandTotal*100):0}%</div></div>`).join('')}
  `;

  // Horizontal bar chart
  const sorted = [...data].sort((a,b)=>b.amt-a.amt);
  const maxAmt = sorted.length ? sorted[0].amt : 1;

  let barHtml = '';
  // Group separator rows + individual bars
  const rendered = new Set();
  groupKeys.forEach(grp=>{
    const grpItems = sorted.filter(d=>d.group===grp);
    if(!grpItems.length) return;
    const grpTotal = grpItems.reduce((s,d)=>s+d.amt,0);
    const grpPct = grandTotal?(grpTotal/grandTotal*100).toFixed(1):0;
    const col = GROUP_BASE[grp]||'#6b7280';
    // Group header bar (full width = group total)
    const grpW = grandTotal?(grpTotal/grandTotal*100):0;
    barHtml+=`<div style="margin-bottom:4px;padding:6px 0 2px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:2px;background:${col};flex-shrink:0"></div>
        <span style="font-size:12px;font-weight:600;color:var(--text)">${grp}</span>
        <span style="font-size:12px;color:var(--text3);margin-left:auto">${fmt(Math.round(grpTotal))} บาท · ${grpPct}%</span>
      </div>`;
    grpItems.forEach(d=>{
      const pct = grandTotal?(d.amt/grandTotal*100).toFixed(1):0;
      const barW = grandTotal?(d.amt/grandTotal*100):0;
      const shortLabel = d.label.replace(/^\[.*?\]\s*/,'');
      barHtml+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;padding-left:18px">
        <div style="font-size:12px;color:var(--text2);min-width:160px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${shortLabel}">${shortLabel}</div>
        <div style="flex:1;height:18px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative">
          <div style="height:100%;width:${barW}%;background:${col};border-radius:3px;opacity:.75;transition:width .4s;min-width:${d.amt>0?'3px':'0'}"></div>
        </div>
        <div style="font-size:12px;font-weight:500;min-width:90px;text-align:right;color:var(--text)">${fmt(Math.round(d.amt))}</div>
        <div style="font-size:11px;color:var(--text3);min-width:36px;text-align:right">${pct}%</div>
      </div>`;
    });
    barHtml+=`</div><div style="height:1px;background:var(--border);margin:4px 0 10px"></div>`;
  });

  if(!data.length) barHtml=`<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">ยังไม่มีข้อมูลสินทรัพย์</div>`;
  document.getElementById('barchart-container').innerHTML=barHtml;

  // Detail table
  let detHtml='';
  const byGroup={};
  data.forEach(d=>{ if(!byGroup[d.group]) byGroup[d.group]=[]; byGroup[d.group].push(d); });
  Object.keys(byGroup).forEach(g=>{
    const gTotal=byGroup[g].reduce((s,d)=>s+d.amt,0);
    detHtml+=`<div class="section-label">${g}</div><div class="card"><table>
      <tr><th>สินทรัพย์</th><th style="text-align:right">มูลค่า</th><th style="text-align:right">สัดส่วน</th></tr>
      ${byGroup[g].sort((a,b)=>b.amt-a.amt).map(d=>`<tr><td>${d.label.replace(/^\[.*?\]\s*/,'')}</td><td style="text-align:right;font-weight:500">${fmt(d.amt)}</td><td style="text-align:right;color:var(--text3)">${grandTotal?(d.amt/grandTotal*100).toFixed(1):0}%</td></tr>`).join('')}
      <tr style="background:var(--surface2)"><td style="font-weight:600">รวม ${g}</td><td style="text-align:right;font-weight:600">${fmt(gTotal)}</td><td style="text-align:right;font-weight:600">${grandTotal?(gTotal/grandTotal*100).toFixed(1):0}%</td></tr>
    </table></div>`;
  });
  if(!data.length) detHtml='';
  document.getElementById('overview-detail').innerHTML=detHtml;
}

function exportExcel(){
  const data = getPortfolioData();
  const grandTotal = data.reduce((s,d)=>s+d.amt,0);
  const now = new Date().toLocaleDateString('th-TH');

  // Build CSV with multiple sections
  const rows = [];
  rows.push(['Investment Portfolio Report']);
  rows.push([`สร้างเมื่อ: ${now}`]);
  rows.push([]);
  rows.push(['=== ภาพรวมทรัพย์สิน ===']);
  rows.push(['หมวดหมู่','สินทรัพย์','มูลค่า (บาท)','สัดส่วน (%)']);
  data.forEach(d=>rows.push([d.group, d.label, d.amt, grandTotal?Math.round(d.amt/grandTotal*100):0]));
  rows.push(['','รวมทั้งหมด',grandTotal,100]);
  rows.push([]);

  // Tax funds detail
  rows.push(['=== กองทุนลดหย่อนภาษี ===']);
  rows.push(['ประเภท','กองทุน','ปีที่ซื้อ','จำนวนเงิน','ปีที่ขายได้','สถานะ']);
  state.taxCategories.forEach(cat=>{
    cat.funds.forEach(fund=>{
      fund.lots.forEach(lot=>{
        const sellY = cat.noExpiry?'ไม่มีกำหนด':lot.year+cat.holdYears;
        rows.push([cat.name, fund.name, lot.year, lot.amt, sellY, lot.sold?`ขายแล้ว ${lot.soldDate}`:'ถือครอง']);
      });
    });
  });
  rows.push([]);

  // Insurance
  rows.push(['=== ประกัน ===']);
  rows.push(['กรมธรรม์','ปี','สถานะ','เบี้ย (บาท)']);
  state.insurances.forEach(p=>{
    p.years.forEach(yr=>{
      rows.push([p.name, yr.year, yr.paid?'จ่ายแล้ว':'รอจ่าย', yr.amt]);
    });
  });
  rows.push([]);

  // MF
  rows.push(['=== กองทุนรวม ===']);
  rows.push(['กลุ่ม','กองทุน','ยอดปัจจุบัน (บาท)','DCA/เดือน']);
  state.mfGroups.forEach(g=>{
    g.funds.forEach(f=>{
      rows.push([g.name, f.name, f.currentAmt, f.dca.enabled?f.dca.amount:0]);
    });
  });
  rows.push([]);

  // Stocks
  rows.push(['=== หุ้น ===']);
  rows.push(['กลุ่ม','ชื่อหุ้น','จำนวนหุ้น','ราคา/หุ้น','มูลค่า (บาท)']);
  (state.stockGroups||[]).forEach(g=>{
    g.stocks.forEach(st=>{
      rows.push([g.name, st.ticker, st.shares, st.price, Math.round(st.shares*st.price)]);
    });
  });

  // Convert to CSV
  const csv = rows.map(r=>r.map(c=>{
    const s=String(c===undefined?'':c);
    return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;
  }).join(',')).join('\n');

  const bom = '\uFEFF';
  const blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;
  a.download=`portfolio_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── RENAME HELPERS ──────────────────────────────────────
function renameTaxCat(id, val){
  const c = state.taxCategories.find(c=>c.id===id);
  if(c && val.trim()){ c.name=val.trim(); save(); }
}
function renameMFGroup(id, val){
  const g = state.mfGroups.find(g=>g.id===id);
  if(g && val.trim()){ g.name=val.trim(); save(); }
}
function renameStockGroup(id, val){
  if(!state.stockGroups) return;
  const g = state.stockGroups.find(g=>g.id===id);
  if(g && val.trim()){ g.name=val.trim(); save(); }
}

const CLIENT_ID = '966042240814-4hk3r3ie2si507s325m9fuvsct1d64q8.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'investment_tracker_data.json';
let driveToken = null;
let driveFileId = null;

function driveSetStatus(msg, color='var(--text3)') {
  const el = document.getElementById('drive-status');
  el.style.display = msg ? 'block' : 'none';
  el.style.color = color;
  el.style.background = 'var(--surface2)';
  el.textContent = msg;
}

function driveSetLoggedIn(user) {
  document.getElementById('btn-drive-login').style.display = 'none';
  document.getElementById('btn-drive-save').style.display = 'flex';
  document.getElementById('btn-drive-load').style.display = 'flex';
  document.getElementById('btn-drive-logout').style.display = 'flex';
  driveSetStatus('✓ ' + (user||'เชื่อมต่อแล้ว'), 'var(--green)');
}

function driveSetLoggedOut() {
  driveToken = null; driveFileId = null;
  document.getElementById('btn-drive-login').style.display = 'flex';
  document.getElementById('btn-drive-save').style.display = 'none';
  document.getElementById('btn-drive-load').style.display = 'none';
  document.getElementById('btn-drive-logout').style.display = 'none';
  driveSetStatus('');
}

function driveLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if(resp.error) { driveSetStatus('Login ไม่สำเร็จ', 'var(--red)'); return; }
      driveToken = resp.access_token;
      // get user info
      try {
        const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+driveToken}});
        const u = await r.json();
        driveSetLoggedIn(u.email||'');
      } catch(e) { driveSetLoggedIn(''); }
      // auto load if file exists
      await driveFindFile();
      if(driveFileId) {
        if(confirm('พบข้อมูลใน Drive ต้องการโหลดมาแทนข้อมูลปัจจุบันมั้ย?')) await driveLoad();
      }
    }
  });
  client.requestAccessToken();
}

function driveLogout() {
  if(driveToken) google.accounts.oauth2.revoke(driveToken, ()=>{});
  driveSetLoggedOut();
}

async function driveFindFile() {
  try {
    const r = await fetch(
      "https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='" + FILE_NAME + "'&fields=files(id,name)",
      {headers:{Authorization:'Bearer '+driveToken}}
    );
    const d = await r.json();
    driveFileId = d.files&&d.files.length ? d.files[0].id : null;
  } catch(e) { driveFileId = null; }
}

async function driveSave() {
  if(!driveToken) { alert('กรุณา Login Google Drive ก่อน'); return; }
  driveSetStatus('กำลังบันทึก...', 'var(--amber)');
  try {
    const json = JSON.stringify(state);
    const blob = new Blob([json], {type:'application/json'});
    await driveFindFile();
    let url, method;
    if(driveFileId) {
      url = 'https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media';
      method = 'PATCH';
    } else {
      // Create with metadata first
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method:'POST',
        headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},
        body: JSON.stringify({name:FILE_NAME, parents:['appDataFolder']})
      });
      const mj = await meta.json();
      driveFileId = mj.id;
      url = 'https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media';
      method = 'PATCH';
    }
    await fetch(url, {method, headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'}, body:json});
    driveSetStatus('✓ บันทึกแล้ว ' + new Date().toLocaleTimeString('th-TH'), 'var(--green)');
  } catch(e) {
    driveSetStatus('บันทึกไม่สำเร็จ', 'var(--red)');
  }
}

async function driveLoad() {
  if(!driveToken) { alert('กรุณา Login Google Drive ก่อน'); return; }
  driveSetStatus('กำลังโหลด...', 'var(--amber)');
  try {
    await driveFindFile();
    if(!driveFileId) { driveSetStatus('ยังไม่มีไฟล์ใน Drive', 'var(--text3)'); return; }
    const r = await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media',
      {headers:{Authorization:'Bearer '+driveToken}});
    const d = await r.json();
    if(!d.taxCategories && !d.insurances && !d.mfGroups) throw new Error();
    state = d;
    if(!state.stockGroups) state.stockGroups = [];
    save();
    renderTax(); renderIns(); renderMF(); renderStocks();
    driveSetStatus('✓ โหลดแล้ว', 'var(--green)');
  } catch(e) {
    driveSetStatus('โหลดไม่สำเร็จ', 'var(--red)');
  }
}

// Auto-save to Drive after every save()
const _origSave = save;
function save() {
  _origSave();
  if(driveToken) driveSave();
}

// ─── EXPORT / IMPORT ───────────────────────────────────────
function exportData(){
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'investment_backup_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if(!parsed.taxCategories && !parsed.insurances && !parsed.mfGroups)
        throw new Error('ไฟล์ไม่ถูกต้อง');
      if(!confirm('นำเข้าข้อมูลใหม่จะแทนที่ข้อมูลปัจจุบันทั้งหมด ยืนยันมั้ย?')) return;
      state = parsed;
      save();
      renderTax(); renderIns(); renderMF();
      alert('นำเข้าข้อมูลสำเร็จ!');
    } catch(err) {
      alert('ไฟล์ไม่ถูกต้อง กรุณาใช้ไฟล์ backup ที่ export จากแอพนี้เท่านั้น');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

renderMF();
renderStocks();
